name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AssetStudio.sln

      - name: Publish GUI
        run: >
          dotnet publish AssetStudio.GUI\AssetStudio.GUI.csproj
          -c Release
          -f net8.0-windows
          -r win-x64
          --self-contained true
          -o dist\AssetStudio-win-x64
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true

      - name: Publish CLI
        run: >
          dotnet publish AssetStudio.CLI\AssetStudio.CLI.csproj
          -c Release
          -f net8.0-windows
          -r win-x64
          --self-contained true
          -o dist\AssetStudio-win-x64
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true

      - name: Verify artifact contents
        shell: pwsh
        run: |
          $publishDir = "dist\AssetStudio-win-x64"
          $required = @(
            "$publishDir\AssetStudio.GUI.exe",
            "$publishDir\AssetStudio.CLI.exe",
            "$publishDir\x64\AssetStudio.FBXNative.dll",
            "$publishDir\x86\AssetStudio.FBXNative.dll"
          )
          foreach ($path in $required) {
            if (!(Test-Path -LiteralPath $path)) {
              throw "Missing expected artifact file: $path"
            }
          }
          Get-ChildItem -LiteralPath $publishDir -Recurse | Select-Object FullName, Length

      - name: Prepare versioned package
        id: package
        shell: pwsh
        run: |
          $publishDir = "dist\AssetStudio-win-x64"
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME
          } else {
            $version = $env:GITHUB_SHA.Substring(0, 7)
          }

          Move-Item -LiteralPath "$publishDir\AssetStudio.GUI.exe" -Destination "$publishDir\AssetStudio.GUI-$version.exe" -Force
          Move-Item -LiteralPath "$publishDir\AssetStudio.CLI.exe" -Destination "$publishDir\AssetStudio.CLI-$version.exe" -Force

          $zipPath = "dist\AssetStudio-win-x64-$version.zip"
          Compress-Archive -Path "$publishDir\*" -DestinationPath $zipPath -Force

          "version=$version" >> $env:GITHUB_OUTPUT
          "zip=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssetStudio-win-x64-${{ steps.package.outputs.version }}
          path: dist\AssetStudio-win-x64
          if-no-files-found: error

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          "${{ steps.package.outputs.zip }}"
          --title "AssetStudio ${{ github.ref_name }}"
          --notes "Automated Windows x64 build for ${{ github.ref_name }}."
