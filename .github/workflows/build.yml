name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AssetStudio.sln

      - name: Publish GUI
        run: >
          dotnet publish AssetStudio.GUI\AssetStudio.GUI.csproj
          -c Release
          -f net8.0-windows
          -r win-x64
          --self-contained true
          -o dist\AssetStudio-win-x64
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true

      - name: Publish CLI
        run: >
          dotnet publish AssetStudio.CLI\AssetStudio.CLI.csproj
          -c Release
          -f net8.0-windows
          -r win-x64
          --self-contained true
          -o dist\AssetStudio-win-x64
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true

      - name: Verify artifact contents
        shell: pwsh
        run: |
          $publishDir = "dist\AssetStudio-win-x64"
          $required = @(
            "$publishDir\AssetStudio.GUI.exe",
            "$publishDir\AssetStudio.CLI.exe",
            "$publishDir\x64\AssetStudio.FBXNative.dll",
            "$publishDir\x86\AssetStudio.FBXNative.dll"
          )
          foreach ($path in $required) {
            if (!(Test-Path -LiteralPath $path)) {
              throw "Missing expected artifact file: $path"
            }
          }
          Get-ChildItem -LiteralPath $publishDir -Recurse | Select-Object FullName, Length

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssetStudio-win-x64-${{ github.sha }}
          path: dist\AssetStudio-win-x64
          if-no-files-found: error
